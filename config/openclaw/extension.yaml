    email: ""
    url: "https://openclaw.ai/"
provider:
  zh:
    name: "Clawdbot Team"
    email: ""
    url: "https://openclaw.ai/"
  en:
    name: "Clawdbot Team"
    email: ""
    url: "https://openclaw.ai/"
icon: ./static/favicon.svg
dependencies:
