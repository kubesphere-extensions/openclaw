name: Build OpenClaw Extended Image

on:
  workflow_dispatch:
    inputs:
      openclaw_image_tag:
        description: OpenClaw base image tag
        required: true
        default: 2026.3.24

env:
  IMAGE_NAME: kubesphere/openclaw-extended

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OPENCLAW_IMAGE_TAG=${{ github.event.inputs.openclaw_image_tag }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.openclaw_image_tag }}
